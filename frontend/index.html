<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AWS API Gateway Assessment</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.5;
    }
    h1 {
      margin-bottom: 8px;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 16px 0;
    }
    button {
      padding: 10px 14px;
      cursor: pointer;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
    }
    pre {
      background: #f6f8fa;
      padding: 16px;
      border-radius: 8px;
      overflow: auto;
    }
    .muted {
      color: #666;
    }
  </style>
</head>
<body>
  <h1>AWS API Gateway Assessment</h1>
  <p class="muted">Cognito Hosted UI + API Gateway + Lambda</p>

  <div class="row">
    <button id="loginBtn">Login</button>
    <button id="logoutBtn">Logout</button>
    <button id="jokesBtn">Call /api/jokes</button>
    <button id="locationBtn">Call /api/location</button>
  </div>

  <div class="card">
    <strong>Auth status</strong>
    <div id="authStatus">Not signed in</div>
  </div>

  <div class="card">
    <strong>Response</strong>
    <pre id="output">No API call yet.</pre>
  </div>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
