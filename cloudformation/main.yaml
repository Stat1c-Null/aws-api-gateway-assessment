AWSTemplateFormatVersion: '2010-09-09'
Description: >
  End-to-end AWS API assessment stack with Cognito managed login, JWT-protected
  HTTP API Gateway, two Lambda functions, private S3 + CloudFront frontend hosting,
  and CloudWatch log retention.

Parameters:
  ProjectName:
    Type: String
    Default: api-assessment
    Description: Short project name used in resource names.

  FrontendBucketName:
    Type: String
    Default: api-assessment-bucket
    Description: >
      S3 bucket name for the static frontend. Must be globally unique.

  CognitoDomainPrefix:
    Type: String
    Default: us-east-1z9wqyrqjy
    Description: >
      Prefix for the Cognito hosted domain. Must be unique in the account/region
      if you create a new domain.

  LocalFrontendOrigin:
    Type: String
    Default: http://localhost:5500
    Description: Local origin used for callback URLs and API CORS during development.

  ApiDeploymentVersion:
    Type: String
    Default: v1
    Description: >
      Bump this value when you want CloudFormation to create a fresh API deployment
      while AutoDeploy is disabled.

Resources:
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref FrontendBucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${ProjectName}-oac
        Description: Access control for private S3 frontend origin
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub ${ProjectName} frontend
        DefaultRootObject: index.html
        HttpVersion: http2
        IPV6Enabled: true
        PriceClass: PriceClass_100
        Origins:
          - Id: FrontendS3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !GetAtt FrontendOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: FrontendS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaLogging
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AllowCreateOwnLogGroups
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*
              - Sid: AllowWriteOwnLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !GetAtt JokesFunctionLogGroup.Arn
                  - !Sub ${JokesFunctionLogGroup.Arn}:*
                  - !GetAtt LocationFunctionLogGroup.Arn
                  - !Sub ${LocationFunctionLogGroup.Arn}:*

  JokesFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ProjectName}-jokes
      RetentionInDays: 14

  LocationFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ProjectName}-location
      RetentionInDays: 14

  JokesFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-jokes
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: nodejs20.x
      Architectures:
        - x86_64
      Handler: index.handler
      MemorySize: 128
      Timeout: 3
      Code:
        ZipFile: |
          exports.handler = async () => {
            try {
              const response = await fetch("https://official-joke-api.appspot.com/random_joke");
              if (!response.ok) {
                return {
                  statusCode: 502,
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ message: "Failed to fetch joke from upstream API." })
                };
              }

              const joke = await response.json();

              return {
                statusCode: 200,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  source: "official-joke-api",
                  joke
                })
              };
            } catch (error) {
              return {
                statusCode: 500,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  message: "Unexpected error while fetching a joke.",
                  error: error.message
                })
              };
            }
          };

  LocationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-location
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.11
      Architectures:
        - x86_64
      Handler: lambda_function.lambda_handler
      MemorySize: 128
      Timeout: 3
      Code:
        ZipFile: |
          import json
          import urllib.request

          def lambda_handler(event, context):
              try:
                  with urllib.request.urlopen("http://ip-api.com/json", timeout=5) as response:
                      data = json.loads(response.read().decode("utf-8"))

                  return {
                      "statusCode": 200,
                      "headers": {"Content-Type": "application/json"},
                      "body": json.dumps({
                          "source": "ip-api",
                          "location": {
                              "country": data.get("country"),
                              "regionName": data.get("regionName"),
                              "city": data.get("city"),
                              "lat": data.get("lat"),
                              "lon": data.get("lon")
                          }
                      })
                  }
              except Exception as error:
                  return {
                      "statusCode": 500,
                      "headers": {"Content-Type": "application/json"},
                      "body": json.dumps({
                          "message": "Unexpected error while fetching location data.",
                          "error": str(error)
                      })
                  }

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${ProjectName}-user-pool
      UserPoolTier: ESSENTIALS
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      MfaConfiguration: OPTIONAL
      EnabledMfas:
        - SOFTWARE_TOKEN_MFA
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: true
          TemporaryPasswordValidityDays: 7
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_CODE

  SpaAppClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${ProjectName}-spa-client
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      CallbackURLs:
        - !Sub ${LocalFrontendOrigin}/
        - !Sub https://${FrontendDistribution.DomainName}/
      LogoutURLs:
        - !Sub ${LocalFrontendOrigin}/
        - !Sub https://${FrontendDistribution.DomainName}/
      SupportedIdentityProviders:
        - COGNITO
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref CognitoDomainPrefix
      ManagedLoginVersion: 2
      UserPoolId: !Ref UserPool

  ManagedLoginBranding:
    Type: AWS::Cognito::ManagedLoginBranding
    Properties:
      UserPoolId: !Ref UserPool
      ClientId: !Ref SpaAppClient
      UseCognitoProvidedValues: true

  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/apigateway/${ProjectName}-http-api
      RetentionInDays: 14

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: production-http-api
      ProtocolType: HTTP
      IpAddressType: dualstack
      CorsConfiguration:
        AllowOrigins:
          - !Ref LocalFrontendOrigin
          - !Sub https://${FrontendDistribution.DomainName}
        AllowMethods:
          - GET
          - OPTIONS
        AllowHeaders:
          - authorization
          - content-type
        MaxAge: 0

  JwtAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref HttpApi
      Name: cognito-jwt
      AuthorizerType: JWT
      IdentitySource:
        - $request.header.Authorization
      JwtConfiguration:
        Audience:
          - !Ref SpaAppClient
        Issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}

  JokesIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      Description: Jokes Lambda proxy integration
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      IntegrationUri: !GetAtt JokesFunction.Arn
      PayloadFormatVersion: '2.0'
      TimeoutInMillis: 3000

  LocationIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      Description: Location Lambda proxy integration
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      IntegrationUri: !GetAtt LocationFunction.Arn
      PayloadFormatVersion: '2.0'
      TimeoutInMillis: 3000

  JokesRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/jokes
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer
      Target: !Sub integrations/${JokesIntegration}

  LocationRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/location
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer
      Target: !Sub integrations/${LocationIntegration}

  JokesInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref JokesFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*

  LocationInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref LocationFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*

  HttpApiDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      - JokesRoute
      - LocationRoute
    Properties:
      ApiId: !Ref HttpApi
      Description: !Sub Manual deployment ${ApiDeploymentVersion}

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: prod
      Description: Production stage with manual deployments
      AutoDeploy: false
      DeploymentId: !Ref HttpApiDeployment
      AccessLogSettings:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: >-
          {"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime",
          "httpMethod":"$context.httpMethod","routeKey":"$context.routeKey","status":"$context.status",
          "protocol":"$context.protocol","responseLength":"$context.responseLength","integrationError":"$context.integrationErrorMessage"}

Outputs:
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool

  SpaAppClientId:
    Description: SPA App Client ID
    Value: !Ref SpaAppClient

  CognitoDomain:
    Description: Cognito managed login base domain
    Value: !Sub https://${UserPoolDomain}.auth.${AWS::Region}.amazoncognito.com

  LocalCallbackUrl:
    Description: Local callback/sign-out URL
    Value: !Sub ${LocalFrontendOrigin}/

  HostedFrontendUrl:
    Description: CloudFront frontend URL
    Value: !Sub https://${FrontendDistribution.DomainName}/

  ApiBaseUrl:
    Description: HTTP API base URL
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${HttpApiStage}

  JokesEndpoint:
    Description: Protected jokes endpoint
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${HttpApiStage}/api/jokes

  LocationEndpoint:
    Description: Protected location endpoint
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${HttpApiStage}/api/location

  FrontendBucket:
    Description: Bucket that stores the frontend files
    Value: !Ref FrontendBucket

  FrontendDeployCommand:
    Description: Example command to upload frontend files after the stack is created
    Value: !Sub aws s3 sync ./frontend s3://${FrontendBucketName} --delete
